name: Build Luci Apps (ImmortalWrt SDK Multi-Arch)

on:
  # 1. 手动触发配置
  workflow_dispatch:
    inputs:
      build_type:
        description: '📦 选择构建类型'
        required: true
        default: 'snapshots'
        type: choice
        options:
          - snapshots
          - openwrt-25.12
          # - releases  <-- 未来若需支持 releases 构建，取消此行注释即可

  # 2. 自动触发配置
  #push:
    #paths:
      #- 'luci/**'          # 监听 luci 目录下的所有改动
      #- '.github/**'       # 监听工作流文件本身的改动
env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  WRT_BRANCH: ${{inputs.build_type}}


jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # 根据官方 URL 规则定义：subdir/target
          # x86_64
          - target: x86_64
            subdir: x86
            target_dir: 64
            
          # Qualcommax IPQ60xx
          - target: qualcommax_ipq60xx
            subdir: qualcommax
            target_dir: ipq60xx
            
          # Mediatek MT7622
          - target: mediatek_mt7622
            subdir: mediatek
            target_dir: mt7622

    steps:
      - name: 检查库
        uses: actions/checkout@v4

      - name: 检查服务器性能
        run: |
          echo "警告⚠"
          echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
          echo -e "已知CPU型号（降序）：7763，8370C，8272CL，8171M，E5-2673 \n"
          echo "--------------------------CPU信息--------------------------"
          echo "CPU物理数量：$(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
          echo -e "CPU核心信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
          echo "--------------------------内存信息--------------------------"
          echo "已安装内存详细信息："
          echo -e "$(sudo lshw -short -C memory | grep GiB) \n"
          echo "--------------------------硬盘信息--------------------------"
          echo "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

      - name: 初始化环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt -yqq purge firefox
          sudo -E apt -yqq update
          sudo -E apt -yqq full-upgrade
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E apt -yqq install dos2unix python3-netifaces libfuse-dev
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E systemctl daemon-reload
          sudo -E timedatectl set-timezone "Asia/Shanghai"

      - name: 克隆代码
        run: |
          git clone --depth=1 --single-branch --branch $WRT_BRANCH https://github.com/immortalwrt/immortalwrt.git ./wrt/

          cd ./wrt/ && echo "WRT_HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV

          # GitHub Action 移除国内下载源
          PROJECT_MIRRORS_FILE="./scripts/projectsmirrors.json"
          if [ -f "$PROJECT_MIRRORS_FILE" ]; then
            sed -i '/.cn\//d; /tencent/d; /aliyun/d' "$PROJECT_MIRRORS_FILE"
          fi
          
      - name: 源码注入
        run: |
          if [ ! -d "luci" ]; then
            echo "::error::找不到 luci 目录！请确保仓库根目录有 luci 文件夹。"
            exit 1
          fi
          
          mkdir -p package/custom-luci
          cp -r luci/* package/custom-luci/
          
          echo "✅ 源码注入完成"
          
            # 初始化 feeds
          echo "⚙️ 初始化 Feeds..."
          ./scripts/feeds update -a
          ./scripts/feeds install -a -f

      - name: 配置和编译
        run: |
          # 生成默认配置
          #echo "CONFIG_CCACHE=y" >> .config
          make defconfig

          # 直接编译整个 package/custom-luci 目录下的所有内容，比解析 Makefile 更可靠
          #echo "🔨 开始编译所有插件..."
          #make package/custom-luci/compile V=s -j$(nproc)
          # 扫描插件并编译
          echo "🔍 扫描并编译插件..."
          for dir in package/custom-luci/*/; do
            if [ -f "$dir/Makefile" ]; then
              pkg_name=$(grep -oE 'PKG_NAME:=(.+)' "$dir/Makefile" | sed 's/PKG_NAME:=//' | head -n 1 | xargs)
              if [ -n "$pkg_name" ]; then
                echo "🔨 编译插件: $pkg_name"
                make package/$pkg_name/compile V=s -j$(nproc) || echo "⚠️ $pkg_name 编译失败"
              fi
            fi
          done

          # 检查编译结果
          if [ ! -d "bin" ] || [ -z "$(ls -A bin)" ]; then
            echo "::warning::编译完成，但未生成 bin 目录或目录为空。
          fi

      - name: 整理输出文件
        run: |
          # 创建 APK 目录并复制 bin 下的内容
          # OpenWrt 23+ 的 ipk 通常在 bin/packages/ 下
          mkdir -p APK
          # 查找所有 .ipk 文件并复制
          #find bin -name "*.ipk" -exec cp {} APK/ \;
          
          # 如果你想打包整个 bin 目录的内容
           cp -r bin/* APK/ 2>/dev/null || true

      - name: 提交文件
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          file_pattern: APK/
          commit_message: Auto compile ${{ matrix.target }} full package repository
          branch: ${{ github.head_ref || github.ref_name }}

      # 完全注释掉 Upload Artifacts，或者取消注释并修正缩进
      # 如果你需要上传，取消注释下面的代码块
      # - name: Upload Artifacts
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: luci-plugins-${{ matrix.target }}
      #     path: APK/
      #     retention-days: 7
