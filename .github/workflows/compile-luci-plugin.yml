name: Build Luci Apps (ImmortalWrt SDK Multi-Arch)

on:
  # 1. 手动触发配置
  workflow_dispatch:
    inputs:
      build_type:
        description: '📦 选择构建类型'
        required: true
        default: 'snapshots'
        type: choice
        options:
          - snapshots
          - openwrt-25.12
          # - releases  <-- 未来若需支持 releases 构建，取消此行注释即可

  # 2. 自动触发配置
  #push:
    #paths:
      #- 'luci/**'          # 监听 luci 目录下的所有改动
      #- '.github/**'       # 监听工作流文件本身的改动

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # 根据官方 URL 规则定义：subdir/target
          # x86_64
          - target: x86_64
            subdir: x86
            target_dir: 64
            
          # Qualcommax IPQ60xx
          - target: qualcommax_ipq60xx
            subdir: qualcommax
            target_dir: ipq60xx
            
          # Mediatek MT7622
          - target: mediatek_mt7622
            subdir: mediatek
            target_dir: mt7622

    steps:
      - name: 检查库
        uses: actions/checkout@v4

      - name: 初始化编译依赖
        run: |
          echo "🚀 正在安装基础依赖..."
          # 安装基础编译环境
          curl -sSL https://build-scripts.immortalwrt.org/init_build_environment.sh -o init_env.sh
          chmod +x init_env.sh
          sudo ./init_env.sh
          rm -f init_env.sh
          
          # 安装 zstd 解压工具 (SDK 使用 .zst 格式)
          sudo apt-get install -y ccache zstd

      - name: 下载SDK
        run: |
          BUILD_TYPE=${{ github.event.inputs.build_type }}
          
          # 根据矩阵参数构建 URL  
          # 示例:https://downloads.openwrt.org/snapshots/targets/x86/64/openwrt-sdk-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          # 示例:https://downloads.immortalwrt.org/snapshots/targets/x86/64/immortalwrt-sdk-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          if [ "$BUILD_TYPE" = "snapshots" ]; then
            BASE_URL="https://downloads.openwrt.org/snapshots"
            #BASE_URL="https://downloads.immortalwrt.org/snapshots"
            # 注意：文件名中的 target 需要将目录结构连接起来 (x86/64 -> x86-64)
            FILE_TARGET_NAME=$(echo "${{ matrix.subdir }}-${{ matrix.target_dir }}" | sed 's/\//-/g')
            DOWNLOAD_URL="${BASE_URL}/targets/${{ matrix.subdir }}/${{ matrix.target_dir }}/openwrt-sdk-${FILE_TARGET_NAME}_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          fi

          echo "🔽 正在下载 SDK: $DOWNLOAD_URL"
          # 【修复点】wget 支持 URL 中的通配符（如果是 FTP）或使用 --content-disposition，这里直接下载
          # 如果通配符无效，wget 会报错，但在 HTTP 下通常需要先获取目录列表。
          # 更稳妥的方式是直接下载（如果服务器支持 HTTP globbing，否则需用其他方法）
          # 这里我们先尝试直接下载（部分镜像支持），如果不支持，请替换为具体的已知版本或使用 html parser。
          # 为了兼容性，如果报错，建议去网页复制最新的具体文件名。
          
          # 尝试下载
          wget -q $DOWNLOAD_URL -O sdk.tar.zst || (
            echo "::error::SDK 下载失败。请检查网络，或者该 URL 不支持通配符。"
            echo "尝试访问: $DOWNLOAD_URL"
            exit 1
          )
          
          if [ ! -f sdk.tar.zst ]; then
            echo "::error::SDK 下载失败，请检查网络或 URL 是否有效。"
            exit 1
          fi
          
          # 解压 .zst 文件
          echo "📦 解压 SDK..."
          # -T --xz 有时是必要的，但 tar 通常能自动识别
          tar --zstd -xf sdk.tar.zst --strip-components=1
          rm sdk.tar.zst
          
      - name: 源码注入
        run: |
          if [ ! -d "luci" ]; then
            echo "::error::找不到 luci 目录！请确保仓库根目录有 luci 文件夹。"
            exit 1
          fi
          
          mkdir -p package/custom-luci
          cp -r luci/* package/custom-luci/
          
          echo "✅ 源码注入完成"
          
            # 初始化 feeds
          echo "⚙️ 初始化 Feeds..."
          # 使用 sed 进行替换
          # 逻辑：匹配非空行且不以#开头的行，在行首添加 #
          #sed -i '/^[^#]/s/^/#/' feeds.conf.default
          #echo "src-git packages https://github.com/immortalwrt/packages.git;openwrt-25.12" > feeds.conf.default
          #echo "src-git luci https://github.com/immortalwrt/luci.git;openwrt-25.12" >> feeds.conf.default
          #echo "src-git routing https://github.com/openwrt/routing.git;openwrt-25.12" >> feeds.conf.default
          #echo "src-git telephony https://github.com/openwrt/telephony.git;openwrt-25.12" >> feeds.conf.default
          #echo "src-git video https://github.com/openwrt/video.git;openwrt-25.12" >> feeds.conf.default
          
          ./scripts/feeds update -a
          ./scripts/feeds install -a -f

      - name: 配置和编译
        run: |
          # 生成默认配置
          #echo "CONFIG_CCACHE=y" >> .config
          make defconfig

          # 直接编译整个 package/custom-luci 目录下的所有内容，比解析 Makefile 更可靠
          #echo "🔨 开始编译所有插件..."
          #make package/custom-luci/compile V=s -j$(nproc)
          # 扫描插件并编译
          echo "🔍 扫描并编译插件..."
          for dir in package/custom-luci/*/; do
            if [ -f "$dir/Makefile" ]; then
              pkg_name=$(grep -oE 'PKG_NAME:=(.+)' "$dir/Makefile" | sed 's/PKG_NAME:=//' | head -n 1 | xargs)
              if [ -n "$pkg_name" ]; then
                echo "🔨 编译插件: $pkg_name"
                make package/$pkg_name/compile V=s -j$(nproc) || echo "⚠️ $pkg_name 编译失败"
              fi
            fi
          done

          # 检查编译结果
          if [ ! -d "bin" ] || [ -z "$(ls -A bin)" ]; then
            echo "::warning::编译完成，但未生成 bin 目录或目录为空。
          fi

      - name: 整理输出文件
        run: |
          # 创建 APK 目录并复制 bin 下的内容
          # OpenWrt 23+ 的 ipk 通常在 bin/packages/ 下
          mkdir -p APK
          # 查找所有 .ipk 文件并复制
          #find bin -name "*.ipk" -exec cp {} APK/ \;
          
          # 如果你想打包整个 bin 目录的内容
           cp -r bin/* APK/ 2>/dev/null || true

      - name: 提交文件
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          file_pattern: APK/
          commit_message: Auto compile ${{ matrix.target }} full package repository
          branch: ${{ github.head_ref || github.ref_name }}

      # 完全注释掉 Upload Artifacts，或者取消注释并修正缩进
      # 如果你需要上传，取消注释下面的代码块
      # - name: Upload Artifacts
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: luci-plugins-${{ matrix.target }}
      #     path: APK/
      #     retention-days: 7
