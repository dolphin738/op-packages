name: Sync Subtree from Upstream

on:
  schedule:
    # 定时任务 (UTC 时间)
    # 例如：每天 UTC 时间 00:00 执行 (北京时间 08:00)
    - cron: '0 0 * * *'
  
  # 允许手动触发测试
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须拉取完整历史，否则 subtree 无法工作
          token: ${{ secrets.GIT_PAT }} # 使用有权限的 Token

      - name: Configure Git User
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Sync Subtree
        env:
          UPSTREAM_REPO: "https://github.com/OWNER/REPO.git" # ⚠️ 替换为上游仓库地址
          UPSTREAM_BRANCH: "main"             # ⚠️ 替换为上游分支 (如 master/main)
          LOCAL_DIR: "path/to/local/dir"      # ⚠️ 替换为你本地的目标目录
          SUBTREE_PATH: "path/in/upstream"    # ⚠️ 替换为上游仓库中的源目录 (可选，如果根目录则留空或调整命令)
        run: |
          echo "Starting subtree sync..."
          
          # 检查是否已经添加过 remote (防止重复添加报错)
          if ! git remote get-url upstream > /dev/null 2>&1; then
            git remote add upstream $UPSTREAM_REPO
          else
            git remote set-url upstream $UPSTREAM_REPO
          fi
          
          # 获取上游最新代码
          git fetch upstream
          
          # 执行 subtree pull
          # 语法: git subtree pull --prefix=<本地目录> <remote> <分支> --squash
          # 注意：如果上游只需要同步子目录，subtree 机制通常是将整个仓库映射到本地目录。
          # 如果你只需要上游的某个子文件夹，通常需要在 clone 后手动 mv，或者上游仓库结构本身就是该文件夹。
          # 这里假设我们要同步整个上游仓库的内容到本地的 LOCAL_DIR 目录
          
          git subtree pull --prefix=$LOCAL_DIR upstream $UPSTREAM_BRANCH --squash
          
          echo "Sync completed."

      - name: Push Changes
        run: |
          git push origin HEAD
        env:
          # 确保使用 PAT 推送，以触发后续的 CI/CD 流程
          GITHUB_TOKEN: ${{ secrets.GIT_PAT }}
