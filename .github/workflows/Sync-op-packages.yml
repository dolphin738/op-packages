name: Sync op-packages from Upstream

on:
  schedule:
    # 定时任务 (UTC 时间)
    # 例如：每天 UTC 时间 00:00 执行 (北京时间 08:00)
    - cron: '0 0 * * *'
  
  # 允许手动触发测试
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须拉取完整历史，否则 subtree 无法工作
          token: ${{ secrets.GH_TOKEN }} # 使用有权限的 Token

      - name: 配置Git用户信息
        run: |
          git config --global user.name "dolphin738"
          git config --global user.email "dolphin738@sina.com"

      - name: 同步插件源
        env:
          # --- 配置区域 ---
          UPSTREAM_URL: "https://github.com/kiddin9/op-packages.git" # 上游仓库地址
          UPSTREAM_BRANCH: "main"                           # 上游分支
          
          # 定义需要同步的文件列表 (格式: "上游路径:本地目标路径")
          # 支持多个文件/文件夹，用换行或分号分隔，这里用多行字符串方便阅读
          FILE_MAP: |
            luci-app-adguardhome:luci-app-adguardhome
            luci-app-wrtbwmon:luci-app-wrtbwmon
            wrtbwmon:wrtbwmon
            luci-app-netspeedtest:luci-app-netspeedtest
            homebox:./
            ookla-speedtest:ookla-speedtest
            luci-app-turboacc:luci-app-turboacc
            shortcut-fe:shortcut-fe
            luci-app-easytier:luci-app-easytier
            easytier:easytier
            luci-app-taskplan:luci-app-taskplan
            luci-app-timedreboot:luci-app-timedreboot
            luci-app-guest-wifi:luci-app-guest-wifi
            luci-app-wolplus:luci-app-wolplus
            luci-app-socat:luci-app-socat
          # ----------------
        run: |
          echo "🚜 启动临时文件夹..."
          TEMP_DIR="/tmp/upstream_src"
          
          # 1. 浅克隆上游仓库 (只拉取最新一次提交，速度极快)
          git clone --depth 1 --branch $UPSTREAM_BRANCH $UPSTREAM_URL $TEMP_DIR
          
          echo "📂 处理文件映射..."
          CHANGED=false
          
          # 2. 解析并复制文件
          # 将多行字符串转换为数组处理
          while IFS=: read -r src_path dest_path; do
            # 跳过空行
            [ -z "$src_path" ] && continue
            
            # 去除可能的首尾空格
            src_path=$(echo $src_path | xargs)
            dest_path=$(echo $dest_path | xargs)
            
            echo "Checking: $src_path -> $dest_path"
            
            # 检查源文件是否存在
            if [ ! -e "$TEMP_DIR/$src_path" ]; then
              echo "❌ Error: Source file not found: $src_path"
              exit 1
            fi
            
            # 创建目标目录 (如果不存在)
            mkdir -p "$(dirname "$dest_path")"
            
            # 复制文件或文件夹 (-r 用于递归复制文件夹)
            cp -r "$TEMP_DIR/$src_path" "$dest_path"
            
            echo "✅ Copied: $src_path to $dest_path"
            CHANGED=true
            
          done <<< "$FILE_MAP"
          
          # 清理临时目录
          rm -rf $TEMP_DIR
          
          if [ "$CHANGED" = false ]; then
            echo "⚠️ No files were processed (check configuration)."
            # 即使没文件，也可能因为逻辑错误，这里继续往下走让 git 判断
          fi

      - name: 提交并推送
        run: |
          # 检查是否有变更
          if [ -z "$(git status --porcelain)" ]; then
            echo "✨ No changes detected. Everything is up to date."
            exit 0
          fi
          
          echo "🚀 Changes detected. Committing..."
          git add .
          git commit -m "chore(auto-sync): update specific files from upstream
        
          Synced via GitHub Actions
          Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          
          echo "Pushing to repository..."
          git push origin HEAD
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
