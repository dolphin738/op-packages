name: Sync op-packages from Multiple Upstreams

on:
  schedule:
    # 每天 UTC 00:00 (北京时间 08:00)
    - cron: '0 0 * * *'
  
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: 配置 Git 用户信息
        run: |
          git config --global user.name "dolphin738"
          git config --global user.email "dolphin738@sina.com"

      - name: 同步多源插件
        env:
          # --- 配置区域开始 ---
          # 格式说明:
          # 1. 以 "REPO:" 开头定义一个新仓库，格式: REPO:<上游URL>:<分支名>
          # 2. 紧接着的行定义该仓库的文件映射，格式: <上游相对路径>:<本地目标路径>
          # 3. 不同仓库之间用空行或直接写下一个 REPO: 分隔
          
          SYNC_CONFIG: |
            REPO:https://github.com/kiddin9/op-packages.git:main
            luci-app-adguardhome:./
            luci-app-wrtbwmon:./
            wrtbwmon:./
            luci-app-netspeedtest:./
            
            REPO:https://github.com/immortalwrt/luci.git:openwrt-23.05
            applications/luci-app-turboacc:package/lean/luci-app-turboacc
            applications/luci-app-easytier:package/lean/luci-app-easytier
            
            REPO:https://github.com/coolsnowwolf/lede.git:master
            package/lean/luci-app-socat:package/lean/luci-app-socat
            package/lean/luci-app-taskplan:package/lean/luci-app-taskplan
          # --- 配置区域结束 ---
        run: |
          echo "🚜 开始多源同步任务..."
          
          CURRENT_REPO_URL=""
          CURRENT_REPO_BRANCH=""
          TEMP_DIR="/tmp/upstream_src_$$" # 使用进程ID避免冲突
          CHANGED=false
          
          # 读取配置每一行
          while IFS= read -r line; do
            # 去除首尾空格
            line=$(echo "$line" | xargs)
            
            # 跳过空行
            [ -z "$line" ] && continue
            
            # 检查是否是新的仓库定义
            if [[ "$line" == REPO:* ]]; then
              # 如果之前有正在处理的仓库，先清理临时目录
              if [ -n "$CURRENT_REPO_URL" ] && [ -d "$TEMP_DIR" ]; then
                rm -rf "$TEMP_DIR"
              fi
              
              # 解析新仓库信息: REPO:URL:BRANCH
              # 使用参数扩展切割字符串
              raw_data="${line#REPO:}"
              CURRENT_REPO_URL="${raw_data%:*}"   # 去掉最后一个冒号后的内容作为分支
              CURRENT_REPO_BRANCH="${raw_data##*:}" # 取最后一个冒号后的内容作为分支
              
              echo "----------------------------------------"
              echo "📦 切换上游仓库: $CURRENT_REPO_URL (分支: $CURRENT_REPO_BRANCH)"
              
              # 浅克隆当前仓库
              if ! git clone --depth 1 --branch "$CURRENT_REPO_BRANCH" "$CURRENT_REPO_URL" "$TEMP_DIR" 2>/dev/null; then
                echo "❌ Error: Failed to clone $CURRENT_REPO_URL"
                exit 1
              fi
              continue
            fi
            
            # 如果不是 REPO 开头，且当前没有激活的仓库，说明配置错误
            if [ -z "$CURRENT_REPO_URL" ]; then
              echo "❌ Error: File mapping defined before any REPO declaration: $line"
              exit 1
            fi
            
            # 处理文件映射: SRC:DST
            if [[ "$line" == *":"* ]]; then
              src_path="${line%%:*}"
              dest_path="${line#*:}"
              
              # 再次去除可能的空格
              src_path=$(echo "$src_path" | xargs)
              dest_path=$(echo "$dest_path" | xargs)
              
              echo "🔍 检查: [$src_path] -> [$dest_path]"
              
              # 检查源文件是否存在
              if [ ! -e "$TEMP_DIR/$src_path" ]; then
                echo "⚠️ Warning: Source not found in $CURRENT_REPO_URL: $src_path (Skipping...)"
                continue
              fi
              
              # 创建目标目录
              mkdir -p "$(dirname "$dest_path")"
              
              # 复制 (覆盖)
              cp -r "$TEMP_DIR/$src_path" "$dest_path"
              echo "✅ 已同步: $src_path"
              CHANGED=true
            else
              echo "⚠️ Warning: Invalid line format (not REPO: or SRC:DST): $line"
            fi
            
          done <<< "$SYNC_CONFIG"
          
          # 清理最后一个仓库的临时目录
          if [ -d "$TEMP_DIR" ]; then
            rm -rf "$TEMP_DIR"
          fi
          
          echo "----------------------------------------"
          if [ "$CHANGED" = true ]; then
            echo "🎉 所有源处理完毕，检测到变更。"
          else
            echo "ℹ️ 所有源处理完毕，未检测到文件变更。"
          fi

      - name: 提交并推送
        run: |
          # 检查是否有变更
          if [ -z "$(git status --porcelain)" ]; then
            echo "✨ No changes detected. Everything is up to date."
            exit 0
          fi
          
          echo "🚀 Changes detected. Committing..."
          git add .
          git commit -m "chore(auto-sync): update files from multiple upstreams
        
          Synced via GitHub Actions
          Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          
          echo "Pushing to repository..."
          git push origin HEAD
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
