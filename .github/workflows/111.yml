name: Sync op-packages from Multiple Upstreams

on:
 #schedule:
    #- cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          # 确保检出配置文件，默认就是全部检出，这里显式写出以防万一
          # 如果仓库很大，可以考虑只 checkout 需要的文件，但通常全量 checkout 也没问题

      - name: 配置 Git 用户信息
        run: |
          git config --global user.name "dolphin738"
          git config --global user.email "dolphin738@sina.com"

      - name: 读取配置并同步多源插件
        env:
          CONFIG_FILE: "sync_config.txt" # 配置文件路径
        run: |
          # 检查配置文件是否存在
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "❌ Error: Configuration file '$CONFIG_FILE' not found!"
            exit 1
          fi

          echo "📄 读取配置文件: $CONFIG_FILE"
          
          CURRENT_REPO_URL=""
          CURRENT_REPO_BRANCH=""
          TEMP_DIR="/tmp/upstream_src_$$"
          CHANGED=false
          
          # 逐行读取本地文件
          while IFS= read -r line || [ -n "$line" ]; do
            # 去除首尾空格
            line=$(echo "$line" | xargs)
            
            # 跳过空行和注释行 (# 开头)
            [ -z "$line" ] && continue
            [[ "$line" == \#* ]] && continue
            
            # 检查是否是新的仓库定义
            if [[ "$line" == REPO:* ]]; then
              # 清理上一个仓库的临时目录
              if [ -n "$CURRENT_REPO_URL" ] && [ -d "$TEMP_DIR" ]; then
                rm -rf "$TEMP_DIR"
              fi
              
              # 解析: REPO:URL:BRANCH
              raw_data="${line#REPO:}"
              CURRENT_REPO_URL="${raw_data%:*}"
              CURRENT_REPO_BRANCH="${raw_data##*:}"
              
              echo "----------------------------------------"
              echo "📦 切换上游仓库: $CURRENT_REPO_URL (分支: $CURRENT_REPO_BRANCH)"
              
              # 浅克隆
              if ! git clone --depth 1 --branch "$CURRENT_REPO_BRANCH" "$CURRENT_REPO_URL" "$TEMP_DIR" 2>/dev/null; then
                echo "❌ Error: Failed to clone $CURRENT_REPO_URL"
                exit 1
              fi
              continue
            fi
            
            # 验证当前是否有激活的仓库
            if [ -z "$CURRENT_REPO_URL" ]; then
              echo "⚠️ Warning: File mapping found before any REPO declaration, skipping: $line"
              continue
            fi
            
            # 处理文件映射: SRC:DST
            if [[ "$line" == *":"* ]]; then
              src_path="${line%%:*}"
              dest_path="${line#*:}"
              
              # 去除空格
              src_path=$(echo "$src_path" | xargs)
              dest_path=$(echo "$dest_path" | xargs)
              
              echo "🔍 检查: [$src_path] -> [$dest_path]"
              
              if [ ! -e "$TEMP_DIR/$src_path" ]; then
                echo "⚠️ Warning: Source not found in $CURRENT_REPO_URL: $src_path (Skipping...)"
                continue
              fi
              
              mkdir -p "$(dirname "$dest_path")"
              cp -r "$TEMP_DIR/$src_path" "$dest_path"
              echo "✅ 已同步: $src_path"
              CHANGED=true
            else
              echo "⚠️ Warning: Invalid line format: $line"
            fi
            
          done < "$CONFIG_FILE" # < 符号表示从文件重定向输入，而不是 <<< 字符串
          
          # 清理最后的临时目录
          if [ -d "$TEMP_DIR" ]; then
            rm -rf "$TEMP_DIR"
          fi
          
          echo "----------------------------------------"
          if [ "$CHANGED" = true ]; then
            echo "🎉 所有源处理完毕，检测到变更。"
          else
            echo "ℹ️ 所有源处理完毕，未检测到文件变更。"
          fi

      - name: 提交并推送
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "✨ No changes detected. Everything is up to date."
            exit 0
          fi
          
          echo "🚀 Changes detected. Committing..."
          git add .
          # 提交信息中包含配置文件的变化可能更有意义，但这里保持通用
          git commit -m "chore(auto-sync): update files from multiple upstreams
        
          Synced via GitHub Actions
          Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          
          echo "Pushing to repository..."
          git push origin HEAD
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
